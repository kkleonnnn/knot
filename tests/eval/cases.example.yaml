# BI-Agent eval 用例模板（仓库内提交版本，**不含真实业务数据**）
#
# 【部署】cp tests/eval/cases.example.yaml tests/eval/cases.yaml，再按业务扩展用例。
# cases.yaml 已加入 .gitignore；conftest.load_cases 优先读 cases.yaml，缺失则回退本 example。
#
# v0.4.0 升级：每类 intent ≥ 8 条 + 24 条 edge case = 80+ 条
#
# 字段说明（与 test_eval.py / test_intent_accuracy.py 对齐）：
#   id              : 唯一短 id（snake_case）
#   intent          : 7 类之一（顶层冗余拷贝，便于按 intent 过滤；真值在 expects.intent）
#   question        : 用户原问题
#   tags            : 可选 [edge_case, ambiguous, security, history_dependent,
#                          multi_lang, explicit_export, metadata_query, cross_source]
#   history_required: 该 case 需要会话历史才能回答（true → 跑时附带 history fixture）
#   expects:
#     intent          : Clarifier 应输出的 intent（v0.4.0 准确率门禁的真值）
#     must_tables     : SQL 必涉及的表（substring，大小写不敏感）
#     must_keywords   : SQL 必含关键词（substring，大小写不敏感）
#     forbid_keywords : SQL 禁含
#     display_hint    : v0.4.0 前端 layout（与 INTENT_TO_HINT 1:1 映射）
#                       metric_card | line | bar | pie | rank_view | retention_matrix | detail_table
#     export_button_visible : v0.4.0 detail intent 才为 true，其他 false

cases:
  # ────────────────────────────────────────────────────────────────────
  # metric (8 条) — 单一聚合值
  # ────────────────────────────────────────────────────────────────────
  - id: metric_yesterday_signups
    intent: metric
    question: 昨天注册了多少新用户
    expects:
      intent: metric
      must_tables: [users]
      must_keywords: [count, created_at]
      forbid_keywords: [DELETE, UPDATE, INSERT, DROP, TRUNCATE, "GROUP BY"]
      display_hint: metric_card
      export_button_visible: false

