name: Eval (Live LLM)

# v0.4.0：用真实 LLM 跑 80 条 case，验证 Clarifier intent 分类准确率 ≥ 90% +
# SQL Planner 关键词约束。需 OPENROUTER_API_KEY secret 配置。

on:
  schedule:
    # 每周一 UTC 16:00 = 周二北京时间 00:00（避开工作日 LLM 限流高峰）
    - cron: "0 16 * * 1"
  workflow_dispatch:        # 手动触发，便于 PR 审查时跑一遍
  pull_request:
    paths:
      # Clarifier / SQL Planner / LLM adapter / eval cases 改动时强制跑
      - "bi_agent/services/knot/**"
      - "bi_agent/services/llm_client.py"
      - "bi_agent/adapters/llm/**"
      - "tests/eval/**"

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install (editable)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run eval (live LLM)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # 模型可在 secret/var 覆盖；默认便宜快的 gemini flash
          EVAL_MODEL: ${{ vars.EVAL_MODEL || 'google/gemini-2.0-flash-001' }}
        run: pytest tests/eval -v --tb=short
