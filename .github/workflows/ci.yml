name: CI

on:
  push:
    branches: [main, "feat/**", "hotfix/**"]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check bi_agent/

      - name: Import-linter (4-layer architecture)
        run: lint-imports

      - name: Pytest
        run: pytest tests/ -v --tb=short

      - name: App boot smoke
        run: python -c "from bi_agent.main import app; print('routes=', len(app.routes))"
