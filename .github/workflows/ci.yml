name: CI

on:
  push:
    branches: [main, "feat/**", "hotfix/**"]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ⚠️ editable 安装必须在所有静态/动态分析步骤之前完成 ——
      # import-linter / pytest / boot-smoke 都依赖 site-packages 中已注册的 bi_agent
      - name: Install (editable)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -c "import bi_agent; print('bi_agent installed at', bi_agent.__file__)"

      - name: Ruff lint
        run: ruff check bi_agent/

      # 依赖 Install 步骤完成；4 层 contract 不绕过即合入
      - name: Import-linter (4-layer architecture)
        run: lint-imports

      - name: Pytest
        run: pytest tests/ -v --tb=short

      - name: App boot smoke
        # v0.4.5 R-45：startup 期 fail-fast 校验 BIAGENT_MASTER_KEY；CI 环境必须显式注入。
        # 用动态生成的临时 key（无固定字符串入 repo）；version 输出顺手 verify bump 生效。
        run: |
          export BIAGENT_MASTER_KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          python -c "from bi_agent.main import app; print('routes=', len(app.routes), 'version=', app.version)"
