name: CI

on:
  push:
    branches: [main, "feat/**", "hotfix/**"]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ⚠️ editable 安装必须在所有静态/动态分析步骤之前完成 ——
      # import-linter / pytest / boot-smoke 都依赖 site-packages 中已注册的 knot
      - name: Install (editable)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -c "import knot; print('knot installed at', knot.__file__)"

      - name: Ruff lint
        run: ruff check knot/

      # v0.5.2 D7 加码：R-94 行数核验（13 文件硬上限不可超）
      - name: File-sizes (R-94)
        run: python3 scripts/check_file_sizes.py

      # 依赖 Install 步骤完成；7 contracts 不绕过即合入
      - name: Import-linter (7 contracts KEPT)
        run: lint-imports

      - name: Pytest
        env:
          KNOT_MASTER_KEY: ${{ secrets.TEST_MASTER_KEY }}
        run: |
          # CI 注入测试 key（v0.4.5 R-37：测试 master key 与生产隔离）
          # 若 secrets.TEST_MASTER_KEY 未配置，conftest autouse fixture 会兜底设置
          if [ -z "$KNOT_MASTER_KEY" ]; then
            export KNOT_MASTER_KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          fi
          pytest tests/ -v --tb=short --ignore=tests/eval

      # v0.6.0.1 R-PA-8：内测期 Phase B 准备性 commit 守护（与 R-PA-5 联动）
      - name: R-PA-8 Phase B leakage check
        run: python3 scripts/check_phase_b_leakage.py

  # v0.5.0 R-72 / R-77：env 4 组合 × 双平台 boot smoke
  # ubuntu-latest 跑全 4 组合（仅新 / 仅旧 / 都设 / 都无）
  # macos-latest 跑 1 组合（仅新）保证 R-77 跨平台 sed/Python 替换真生效
  boot-smoke:
    name: boot smoke (${{ matrix.env_setup.name }}, ${{ matrix.os }})
    needs: lint-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        env_setup:
          - { name: "only-knot",    set_knot: "yes", set_biagent: "no" }
          - { name: "only-biagent", set_knot: "no",  set_biagent: "yes" }
          - { name: "both-same",    set_knot: "yes", set_biagent: "same" }
          - { name: "neither",      set_knot: "no",  set_biagent: "no" }  # 期望 fail-fast
        include:
          # macOS 仅跑 only-knot 路径，验证 R-77 跨平台无 sed -i '' 隐患
          - os: macos-latest
            env_setup: { name: "only-knot", set_knot: "yes", set_biagent: "no" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install (editable)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Boot smoke
        run: |
          TEST_KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")

          # 设置 env 按 matrix 组合
          if [ "${{ matrix.env_setup.set_knot }}" = "yes" ]; then
            export KNOT_MASTER_KEY="$TEST_KEY"
          fi
          if [ "${{ matrix.env_setup.set_biagent }}" = "yes" ]; then
            export BIAGENT_MASTER_KEY="$TEST_KEY"
          elif [ "${{ matrix.env_setup.set_biagent }}" = "same" ]; then
            export BIAGENT_MASTER_KEY="$TEST_KEY"  # 同值
          fi

          case "${{ matrix.env_setup.name }}" in
            neither|only-biagent)
              # neither: 双 env 都无 → fail-fast
              # only-biagent (v0.6.0-hotfix LOCKED 盲区 #8 补救): v0.4.x 升级守护测 —
              #   残留旧 BIAGENT_MASTER_KEY env 而未改 KNOT_MASTER_KEY → fail-fast +
              #   友好提示用户升级。v0.6.0 commit 4 撤回 R-67/68/74 双源后，本 matrix
              #   item 从"成功路径"语义反转为"升级路径守护"语义（CHANGELOG 撤回声明
              #   同精神 — 测守护友好升级体验）。
              set +e
              OUT=$(python -c "from knot.main import app" 2>&1)
              rc=$?
              set -e
              echo "$OUT"
              if [ $rc -ne 1 ]; then
                echo "::error::${{ matrix.env_setup.name }} 路径期望 exit 1（v0.6.0 撤回双源），实际 $rc"
                exit 1
              fi
              echo "$OUT" | grep -q "KNOT 启动失败" || (echo "::error::缺友好错误文案"; exit 1)
              echo "$OUT" | grep -q "KNOT_MASTER_KEY" || (echo "::error::缺新 env 名提示"; exit 1)
              echo "$OUT" | grep -q "Fernet.generate_key" || (echo "::error::缺生成命令提示"; exit 1)
              echo "${{ matrix.env_setup.name }} path: fail-fast 正确 ✓"
              ;;
            *)
              # 三个成功路径：title=KNOT / version 动态读 main.py（v0.5.8 R-187 偿还
              # v0.5.0 R-72 留下的硬编 bug）/ routes=77（v0.5.40 +3 stats / v0.5.42 +2 budget-config）
              python -c "
          import re
          src = open('knot/main.py').read()
          expected = re.search(r'version=\"([\d.]+)\"', src).group(1)
          from knot.main import app
          assert app.title == 'KNOT', f'title={app.title}'
          assert app.version == expected, f'version={app.version} expected={expected}'
          assert len(app.routes) == 77, f'routes={len(app.routes)}'
          print(f'boot smoke OK: title=KNOT version={app.version} routes=77')
          "
              ;;
          esac

  # v0.6.0.1 G-5 守护者立约：docker build CI 自动闸门
  # R-PA-15 非阻塞性 — continue-on-error（避免 docker hub rate limit 等环境噪声误杀 PR）
  # 但 R-PA-11 三守护（prompts/_template_catalog.py/frontend-builder /knot/static）必过
  # 闸门 13.A 本地 simulate catch 过 Dockerfile bug 但人手动跑不可持续 — CI 自动化是唯一可持续守护
  docker-build:
    name: docker build smoke
    needs: lint-test
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: docker build
        run: |
          docker build -t knot-ci-smoke . 2>&1 | tee build.log
          if grep -q "ERROR\|error: failed" build.log; then
            echo "::error::docker build 失败 — R-PA-11 守护对象"
            exit 1
          fi
          echo "docker build OK"
      - name: R-PA-7 三守护文件验证（docker exec）
        run: |
          docker run --rm --entrypoint sh knot-ci-smoke -c "ls /app/knot/prompts/" | tee /tmp/prompts.txt
          grep -q "sql_planner.md" /tmp/prompts.txt || (echo "::error::R-PA-7.1 prompts COPY 守护失败"; exit 1)
          docker run --rm --entrypoint sh knot-ci-smoke -c "ls /app/knot/services/agents/_template_catalog.py" \
            || (echo "::error::R-PA-7.2 _template_catalog.py COPY 守护失败"; exit 1)
          docker run --rm --entrypoint sh knot-ci-smoke -c "ls /app/knot/static/index.html" \
            || (echo "::error::R-PA-7.3 frontend static COPY 守护失败"; exit 1)
          echo "R-PA-7.1/7.2/7.3 三守护 PASS"
